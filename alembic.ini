[alembic]
script_location = alembic
sqlalchemy.url = postgresql://erp_user:erp_password@localhost:5432/erp_db

[log]
level = INFO
handlers = console

[handlers]
keys = console

[handler_console]
class = StreamHandler
args = (sys.stderr,)
formatter = generic

[formatters]
keys = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
